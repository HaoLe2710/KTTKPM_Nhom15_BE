      tags:
      - Admin Search
      summary: Update synonym group
      operationId: updateAdminSynonymGroup
      parameters:
      - $ref: "#/components/parameters/AdminUserRoleHeader"
      - $ref: "#/components/parameters/AdminUserIdHeader"
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SynonymGroupWriteRequest"
      responses:
        "204":
          description: Synonym group updated
  /api/v1/admin/search/synonym-groups/{id}/terms:
    post:
      tags:
      - Admin Search
      summary: Add synonym term
      operationId: addAdminSynonymTerm
      parameters:
      - $ref: "#/components/parameters/AdminUserRoleHeader"
      - $ref: "#/components/parameters/AdminUserIdHeader"
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SynonymTermWriteRequest"
      responses:
        "201":
          description: Synonym term added and projection task enqueued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectionEnqueueResponse"
  /api/v1/admin/search/synonym-terms/{termId}:
    delete:
      tags:
      - Admin Search
      summary: Delete synonym term
      operationId: deleteAdminSynonymTerm
      parameters:
      - $ref: "#/components/parameters/AdminUserRoleHeader"
      - $ref: "#/components/parameters/AdminUserIdHeader"
      - name: termId
        in: path
        required: true
        schema:
          type: string
      responses:
        "204":
          description: Synonym term deleted
