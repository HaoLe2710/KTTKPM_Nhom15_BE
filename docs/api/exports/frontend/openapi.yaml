openapi: 3.1.0
info:
  title: KTTKPM_Nhom15_BE API
  description: Frontend OpenAPI handoff for the KTTKPM_Nhom15_BE backend, including the admin dashboard APIs used to manage catalog and search data. Admin endpoints are under /api/v1/admin/** and require X-User-Role with ADMIN or STAFF; X-User-Id should also be sent for audit context.
  contact:
    name: Backend Team
    email: backend-team@example.local
  license:
    name: Internal Use
    url: https://example.local/internal-use
  version: v1
externalDocs:
  description: Generated API artifacts for frontend and QA
  url: /docs/api/exports/frontend/openapi.yaml
servers:
- url: http://localhost:8080
  description: Generated server url
tags:
- name: Admin Catalog
  description: Admin dashboard endpoints for catalog health, products, variants, options, and media management.
- name: Admin Search
  description: Admin dashboard endpoints for search analytics, projection operations, suggestions, and synonym management.
- name: Analytics
  description: Reporting and operational metrics endpoints.
- name: Cart
  description: Shopping cart and cart line management.
- name: Catalog
  description: "Catalog, product, media, and master-data endpoints."
- name: Chat
  description: Chat room and conversation endpoints.
- name: Orders
  description: Order placement and order lifecycle endpoints.
- name: Promotions
  description: Promotion management endpoints.
- name: Reviews
  description: Product review creation and moderation endpoints.
- name: Search
  description: "Search, suggestions, and search projection administration endpoints."
- name: Users
  description: User management endpoints.
paths:
  /api/v1/users/{id}:
    get:
      tags:
      - Users
      operationId: getUserById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserResponse"
    put:
      tags:
      - Users
      operationId: updateUser
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
        required: true
      responses:
        "200":
          description: OK
    delete:
      tags:
      - Users
      operationId: deleteUser
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
  /api/v1/promotions/{promotionId}:
    put:
      tags:
      - Promotions
      operationId: updatePromotion
      parameters:
      - name: promotionId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePromotionRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PromotionResponseDTO"
    delete:
      tags:
      - Promotions
      operationId: deletePromotion
      parameters:
      - name: promotionId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
  /api/v1/users:
    get:
      tags:
      - Users
      operationId: getUsers
      parameters:
      - name: keyword
        in: query
        required: false
        schema:
          type: string
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 10
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageUserResponse"
    post:
      tags:
      - Users
      operationId: createUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
                additionalProperties:
                  type: string
  /api/v1/search/projections/rebuild-all:
    post:
      tags:
      - Search
      operationId: rebuildAllProducts
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TriggerFullSearchProjectionRebuildResult"
  /api/v1/reviews:
    post:
      tags:
      - Reviews
      operationId: createReview
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CreateReviewResult"
  /api/v1/promotions:
    post:
      tags:
      - Promotions
      operationId: createPromotion
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePromotionRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PromotionResponseDTO"
  /api/v1/promotions/{promotionId}/deactivate:
    post:
      tags:
      - Promotions
      operationId: deactivatePromotion
      parameters:
      - name: promotionId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PromotionResponseDTO"
  /api/v1/products:
    get:
      tags:
      - Catalog
      operationId: getProducts
      parameters:
      - name: typeId
        in: query
        required: false
        schema:
          type: string
      - name: minPrice
        in: query
        required: false
        schema:
          type: number
      - name: maxPrice
        in: query
        required: false
        schema:
          type: number
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 20
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageProductSummaryDTO"
    post:
      tags:
      - Catalog
      operationId: createProduct
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompositeProductRequestDTO"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: string
  /api/v1/products/{productId}/variants/{variantId}/media:
    post:
      tags:
      - Catalog
      operationId: uploadVariantMedia
      parameters:
      - name: productId
        in: path
        required: true
        schema:
          type: string
      - name: variantId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
              - file
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Media"
  /api/v1/products/{productId}/media:
    post:
      tags:
      - Catalog
      operationId: uploadProductMedia
      parameters:
      - name: productId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
              - file
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Media"
  /api/v1/product-types:
    get:
      tags:
      - Catalog
      operationId: getProductTypes
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductTypeResponse"
    post:
      tags:
      - Catalog
      operationId: createProductType
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductTypeRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProductTypeResponse"
  /api/v1/orders:
    post:
      tags:
      - Orders
      operationId: placeOrder
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceOrderRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PlaceOrderResult"
  /api/v1/orders/{orderId}/cancel:
    post:
      tags:
      - Orders
      operationId: cancelOrder
      parameters:
      - name: orderId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelOrderRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CancelOrderResult"
  /api/v1/options:
    get:
      tags:
      - Catalog
      operationId: getOptions
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OptionResponse"
    post:
      tags:
      - Catalog
      operationId: createOption
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OptionRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/OptionResponse"
  /api/v1/chat/rooms/{roomId}/messages:
    get:
      tags:
      - Chat
      operationId: getChatHistory
      parameters:
      - name: roomId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
    post:
      tags:
      - Chat
      operationId: sendMessage
      parameters:
      - name: roomId
        in: path
        required: true
        schema:
          type: string
      - name: X-User-Id
        in: header
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: string
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
                additionalProperties:
                  type: string
  /api/v1/carts/items:
    post:
      tags:
      - Cart
      operationId: addToCart
      parameters:
      - name: X-User-Id
        in: header
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddToCartRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CartSummaryDTO"
  /api/v1/users/{targetId}/toggle-status:
    patch:
      tags:
      - Users
      operationId: toggleStatus
      parameters:
      - name: X-User-Id
        in: header
        required: true
        schema:
          type: string
      - name: targetId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
  /api/v1/products/{productId}/variants/{variantId}:
    patch:
      tags:
      - Catalog
      operationId: patchVariant
      parameters:
      - name: productId
        in: path
        required: true
        schema:
          type: string
      - name: variantId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchVariantRequest"
        required: true
      responses:
        "200":
          description: OK
  /api/v1/search/suggestions:
    get:
      tags:
      - Search
      operationId: getSuggestions
      parameters:
      - name: q
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SearchSuggestionDTO"
  /api/v1/products/{id}:
    get:
      tags:
      - Catalog
      operationId: getProduct
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Product"
  /api/v1/products/search:
    get:
      tags:
      - Search
      operationId: searchProducts
      parameters:
      - name: q
        in: query
        required: false
        schema:
          type: string
      - name: typeIds
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
      - name: minPrice
        in: query
        required: false
        schema:
          type: number
      - name: maxPrice
        in: query
        required: false
        schema:
          type: number
      - name: inStock
        in: query
        required: false
        schema:
          type: boolean
      - name: sort
        in: query
        required: false
        schema:
          type: string
          default: relevance
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 20
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/SearchResponseDTO"
  /api/v1/analytics/report/pdf:
    get:
      tags:
      - Analytics
      operationId: downloadPdfReport
      parameters:
      - name: startDate
        in: query
        required: true
        schema:
          type: string
          format: date-time
      - name: endDate
        in: query
        required: true
        schema:
          type: string
          format: date-time
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: string
                format: byte
  /api/v1/analytics/dashboard:
    get:
      tags:
      - Analytics
      operationId: getDashboardReport
      parameters:
      - name: startDate
        in: query
        required: true
        schema:
          type: string
          format: date-time
      - name: endDate
        in: query
        required: true
        schema:
          type: string
          format: date-time
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DashboardReportResponse"
  /api/v1/reviews/{reviewId}:
    delete:
      tags:
      - Reviews
      operationId: deleteReview
      parameters:
      - name: reviewId
        in: path
        required: true
        schema:
          type: string
      - name: userId
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DeleteReviewResult"
  /api/v1/admin/catalog/health:
    get:
      tags:
      - Admin Catalog
      summary: Get catalog health summary
      description: Returns issue counters that drive the admin dashboard health widgets for catalog quality and readiness.
      operationId: getAdminCatalogHealth
      parameters:
      - $ref: "#/components/parameters/AdminUserRoleHeader"
      - $ref: "#/components/parameters/AdminUserIdHeader"
      responses:
        "200":
          description: Catalog health summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogHealthResponse"
  /api/v1/admin/products:
    get:
      tags:
      - Admin Catalog
      summary: List admin products
      description: Returns paginated products for the admin product table with search, type, activity, and sort filters.
      operationId: getAdminProducts
      parameters:
      - $ref: "#/components/parameters/AdminUserRoleHeader"
      - $ref: "#/components/parameters/AdminUserIdHeader"
      - name: q
        in: query
        required: false
        description: Full-text match against product name and related admin product search fields.
        schema:
          type: string
      - name: typeId
        in: query
        required: false
        schema:
          type: string
      - name: active
        in: query
        required: false
        schema:
          type: boolean
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
          minimum: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 20
          minimum: 1
          maximum: 100
      - name: sort
        in: query
        required: false
        description: Supports updatedAt,desc by default. Allowed fields are name, slug, updatedAt, projectionUpdatedAt.
        schema:
          type: string
          default: updatedAt,desc
      responses:
        "200":
          description: Admin product page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageProductListItemResponse"
    post:
      tags:
      - Admin Catalog
      summary: Create product
      description: Creates a product together with its initial variants for the admin catalog flow.
      operationId: createAdminProduct
      parameters:
      - $ref: "#/components/parameters/AdminUserRoleHeader"
      - $ref: "#/components/parameters/AdminUserIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductCreateRequest"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatedResourceResponse"
  /api/v1/admin/products/{id}:
    get:
      tags:
      - Admin Catalog
      summary: Get admin product detail
      operationId: getAdminProduct
      parameters:
      - $ref: "#/components/parameters/AdminUserRoleHeader"
      - $ref: "#/components/parameters/AdminUserIdHeader"
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Product detail with search and variant data for the admin edit screen
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDetailResponse"
    put:
      tags:
      - Admin Catalog
      summary: Update product
      operationId: updateAdminProduct
      parameters:
      - $ref: "#/components/parameters/AdminUserRoleHeader"
      - $ref: "#/components/parameters/AdminUserIdHeader"
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdateRequest"
      responses:
        "200":
          description: Updated product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDetailResponse"
  /api/v1/admin/products/{id}/active:
    patch:
      tags:
      - Admin Catalog
      summary: Toggle product active state
      operationId: toggleAdminProductActive
      parameters:
      - $ref: "#/components/parameters/AdminUserRoleHeader"
      - $ref: "#/components/parameters/AdminUserIdHeader"
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleActiveRequest"
      responses:
        "204":
          description: Product active state updated
  /api/v1/admin/products/{id}/search-status:
    get:
      tags:
      - Admin Catalog
      summary: Get product search projection status
      operationId: getAdminProductSearchStatus
      parameters:
      - $ref: "#/components/parameters/AdminUserRoleHeader"
      - $ref: "#/components/parameters/AdminUserIdHeader"
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Search indexing status for the product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchStatusResponse"
  /api/v1/admin/products/{id}/search-preview:
    get:
      tags:
      - Admin Search
      summary: Preview indexed search document for a product
      operationId: getAdminProductSearchPreview
      parameters:
      - $ref: "#/components/parameters/AdminUserRoleHeader"
      - $ref: "#/components/parameters/AdminUserIdHeader"
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Search preview used by the admin search-debug UI
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchPreviewResponse"
  /api/v1/admin/variants:
    post:
      tags:
      - Admin Catalog
      summary: Create variant
      operationId: createAdminVariant
      parameters:
      - $ref: "#/components/parameters/AdminUserRoleHeader"
      - $ref: "#/components/parameters/AdminUserIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VariantCreateRequest"
      responses:
        "201":
          description: Variant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VariantSummaryResponse"
  /api/v1/admin/variants/{id}:
    put:
      tags:
      - Admin Catalog
      summary: Update variant
      operationId: updateAdminVariant
      parameters:
      - $ref: "#/components/parameters/AdminUserRoleHeader"
      - $ref: "#/components/parameters/AdminUserIdHeader"
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VariantUpdateRequest"
      responses:
        "200":
          description: Updated variant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VariantSummaryResponse"
  /api/v1/admin/variants/{id}/stock:
    patch:
      tags:
      - Admin Catalog
      summary: Patch variant stock
      operationId: patchAdminVariantStock
      parameters:
      - $ref: "#/components/parameters/AdminUserRoleHeader"
      - $ref: "#/components/parameters/AdminUserIdHeader"
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VariantStockPatchRequest"
      responses:
        "204":
          description: Variant stock updated
  /api/v1/admin/variants/{id}/active:
    patch:
      tags:
      - Admin Catalog
      summary: Toggle variant active state
      operationId: toggleAdminVariantActive
      parameters:
      - $ref: "#/components/parameters/AdminUserRoleHeader"
      - $ref: "#/components/parameters/AdminUserIdHeader"
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleActiveRequest"
      responses:
        "204":
          description: Variant active state updated
  /api/v1/admin/options:
    get:
      tags:
      - Admin Catalog
      summary: List options
      operationId: getAdminOptions
      parameters:
      - $ref: "#/components/parameters/AdminUserRoleHeader"
      - $ref: "#/components/parameters/AdminUserIdHeader"
      - name: active
        in: query
        required: false
        schema:
          type: boolean
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
          minimum: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 20
          minimum: 1
          maximum: 100
      - name: sort
        in: query
        required: false
        description: Allowed fields are name, code, usageCount.
        schema:
          type: string
          default: name,asc
      responses:
        "200":
          description: Option page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageOptionListItemResponse"
    post:
